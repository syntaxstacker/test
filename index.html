<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>!! BIRTHDAY PROTOCOL INITIATED !!</title>
    <style>
        body {
            background-color: #000;
            color: #0F0; /* Green text */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            z-index: 1;
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border: 1px solid #0F0;
            box-shadow: 0 0 15px #0F0;
        }

        #countdown {
            font-size: 5em;
            animation: glitch 1.5s linear infinite alternate-reverse;
        }

        #birthday-message {
            display: none; /* Hidden initially */
            font-size: 2em;
        }

        #birthday-message h1 {
            font-size: 2.5em;
            color: #0F0;
            text-shadow: 0 0 5px #0F0, 0 0 10px #0F0;
            margin-bottom: 10px;
        }
        
        #birthday-message h2 {
            font-size: 1.8em;
            color: #3F3; /* Lighter green */
             margin-bottom: 20px;
        }

        #birthday-message p {
            font-size: 1.2em;
            line-height: 1.6;
        }
        
        .special-hacker-text {
            color: #FF00FF; /* Magenta for special message */
            animation: flicker 2s infinite;
        }

        /* Glitch animation for countdown */
        @keyframes glitch {
            0% { text-shadow: -2px -2px 0 #F00, 2px 2px 0 #00F; }
            25% { text-shadow: 2px 2px 0 #F00, -2px -2px 0 #00F; }
            50% { text-shadow: 2px -2px 0 #F00, -2px 2px 0 #00F; }
            75% { text-shadow: -2px 2px 0 #F00, 2px -2px 0 #00F; }
            100% { text-shadow: -2px -2px 0 #F00, 2px 2px 0 #00F; }
        }
        
        /* Flicker animation for special text */
        @keyframes flicker {
          0%, 18%, 22%, 25%, 53%, 57%, 100% {
            text-shadow:
              0 0 4px #fff,
              0 0 11px #fff,
              0 0 19px #fff,
              0 0 40px #0fa,
              0 0 80px #0fa,
              0 0 90px #0fa,
              0 0 100px #0fa,
              0 0 150px #0fa;
            opacity: 1;
          }
          20%, 24%, 55% { opacity: 0.8; text-shadow: none; }
        }

    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    <div class="container">
        <div id="countdown">5</div>
        <div id="birthday-message">
            <h1> Zugriff gewährt!</h1>
            <h2>祝 吴茂春 生日快乐!</h2>
            <p>正在执行生日祝福协议...</p>
            <p class="special-hacker-text">老婆~ 生日快乐! 愿你代码无BUG，天天好心情！</p>
            <p>&gt;_ 系统信息：你又年轻了一岁！</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const katakana = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレヱゲゼデベペオォコソトノホモヨョロヲゴゾドボポヴッン';
        const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const nums = '0123456789';
        const characters = katakana + latin + nums;

        const fontSize = 16;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#0F0'; // Green
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33); // Draw a frame roughly 30 FPS

        // Countdown logic
        let timeLeft = 5;
        const countdownElement = document.getElementById('countdown');
        const birthdayMessageElement = document.getElementById('birthday-message');

        const countdownInterval = setInterval(() => {
            timeLeft--;
            countdownElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                countdownElement.style.display = 'none';
                birthdayMessageElement.style.display = 'block';
                // Optional: Add an animation to reveal the birthday message
                birthdayMessageElement.style.animation = 'fadeIn 2s ease-out';
            }
        }, 1000);

        // CSS for potential fadeIn animation (add to <style> if desired)
        /*
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        */
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Recalculate columns if needed, though drops array size is fixed
        });
    </script>
</body>
</html>
